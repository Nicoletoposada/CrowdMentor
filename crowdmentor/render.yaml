databases:
  - name: crowdmentor-db
    databaseName: crowdmentor
    user: crowdmentor
    plan: free

services:
  - type: web
    name: crowdmentor
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate && python manage.py train_ai"
    startCommand: "gunicorn crowdmentor.wsgi:application"
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "crowdmentor.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: crowdmentor-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
      # ── IA Remota (Gemini) ──
      - key: GEMINI_API_KEY
        sync: false   # Se establece manualmente en el dashboard de Render
      - key: GEMINI_MODEL
        value: "gemini-2.0-flash"
      - key: AI_PREFER_REMOTE
        value: "true"
      - key: AI_ENABLE_REMOTE_FALLBACK
        value: "true"
