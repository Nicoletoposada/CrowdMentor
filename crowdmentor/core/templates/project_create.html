{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% load static %}

{% block content %}
    <div class="col-md-8 mx-auto">
        <h2>Crear un Nuevo Proyecto</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary">Crear Proyecto</button>
        </form>
    </div>
{% endblock %}
